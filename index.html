<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mes trajets vélo · trottinette</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0F2830">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Chivo+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --petrol:#0F2830;
    --petrol-2:#143540;
    --petrol-3:#1B4450;
    --mist:#E8F0EF;
    --mist-dim:#8FAAAD;
    --velo:#FFB937;
    --trott:#5AC8E0;
    --line:rgba(232,240,239,.10);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--petrol);
    color:var(--mist);
    font-family:'Sora',system-ui,sans-serif;
    display:flex;justify-content:center;
    min-height:100dvh;
  }
  .app{width:100%;max-width:430px;padding:20px 16px 40px}

  /* ---- header ---- */
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .month-label{font-weight:700;font-size:1.25rem;letter-spacing:.01em;text-transform:capitalize}
  .month-label small{display:block;font-weight:400;font-size:.72rem;color:var(--mist-dim);letter-spacing:.14em;text-transform:uppercase}
  .nav{display:flex;gap:8px}
  .nav button{
    width:42px;height:42px;border-radius:12px;border:1px solid var(--line);
    background:var(--petrol-2);color:var(--mist);font-size:1.15rem;cursor:pointer;
    transition:background .15s;
  }
  .nav button:active{background:var(--petrol-3)}
  .nav button:focus-visible{outline:2px solid var(--velo);outline-offset:2px}

  /* ---- odometer ---- */
  .odometer{
    background:linear-gradient(160deg,var(--petrol-2),var(--petrol-3));
    border:1px solid var(--line);
    border-radius:18px;
    padding:18px 20px 16px;
    margin-bottom:20px;
    position:relative;
    overflow:hidden;
  }
  .odometer::after{
    content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(90deg,transparent 0 26px,rgba(232,240,239,.03) 26px 28px);
    pointer-events:none;
  }
  .odo-row{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
  .odo-big{font-family:'Chivo Mono',monospace;font-weight:700;font-size:2.6rem;line-height:1;color:var(--velo);font-variant-numeric:tabular-nums}
  .odo-big .unit{font-size:.85rem;font-weight:500;color:var(--mist-dim);margin-left:6px;font-family:'Sora',sans-serif}
  .odo-euro{font-family:'Chivo Mono',monospace;font-weight:700;font-size:1.5rem;color:var(--mist);font-variant-numeric:tabular-nums}
  .odo-sub{margin-top:8px;font-size:.72rem;color:var(--mist-dim);display:flex;justify-content:space-between}
  .odo-split{display:flex;gap:14px}
  .odo-split span{display:inline-flex;align-items:center;gap:4px}

  /* ---- calendar ---- */
  .weekdays,.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .weekdays{margin-bottom:6px}
  .weekdays div{text-align:center;font-size:.66rem;letter-spacing:.12em;color:var(--mist-dim);text-transform:uppercase;padding:4px 0}
  .day{
    aspect-ratio:1/1.05;
    border-radius:12px;
    border:1px solid var(--line);
    background:var(--petrol-2);
    color:var(--mist);
    font-family:'Sora',sans-serif;
    font-size:.82rem;font-weight:600;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    cursor:pointer;
    transition:transform .1s, background .15s, border-color .15s;
    user-select:none;
  }
  .day:active{transform:scale(.93)}
  .day:focus-visible{outline:2px solid var(--velo);outline-offset:2px}
  .day .ico{font-size:1.05rem;line-height:1;min-height:1.1em}
  .day.empty-cell{background:transparent;border:none;pointer-events:none}
  .day.weekend{color:var(--mist-dim);background:rgba(20,53,64,.45)}
  .day.today{border-color:var(--mist);border-width:1.5px}
  .day.velo{background:rgba(255,185,55,.16);border-color:rgba(255,185,55,.55);color:var(--velo)}
  .day.trott{background:rgba(90,200,224,.14);border-color:rgba(90,200,224,.55);color:var(--trott)}

  .legend{margin:14px 2px 22px;font-size:.72rem;color:var(--mist-dim);line-height:1.7}
  .legend b{color:var(--mist);font-weight:600}
  .legend .dot-v{color:var(--velo)}
  .legend .dot-t{color:var(--trott)}

  /* ---- settings ---- */
  .settings{
    border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;margin-bottom:16px;background:var(--petrol-2);
  }
  .settings h2{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mist-dim);font-weight:600;margin-bottom:10px}
  .set-row{display:flex;gap:10px}
  .field{flex:1}
  .field label{display:block;font-size:.7rem;color:var(--mist-dim);margin-bottom:4px}
  .field input{
    width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);
    background:var(--petrol);color:var(--mist);
    font-family:'Chivo Mono',monospace;font-size:1rem;font-weight:500;
  }
  .field input:focus-visible{outline:2px solid var(--velo);outline-offset:1px;border-color:transparent}

  .copy-btn{
    width:100%;padding:13px;border-radius:12px;border:1px solid var(--line);
    background:var(--petrol-2);color:var(--mist);font-family:'Sora',sans-serif;
    font-size:.85rem;font-weight:600;cursor:pointer;transition:background .15s;
  }
  .copy-btn:active{background:var(--petrol-3)}
  .copy-btn:focus-visible{outline:2px solid var(--velo);outline-offset:2px}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
    background:var(--mist);color:var(--petrol);padding:10px 18px;border-radius:99px;
    font-size:.8rem;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;
    white-space:nowrap;z-index:10;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion:reduce){
    *{transition:none!important}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="month-label" id="monthLabel"><small>Trajets domicile–travail</small>Juillet 2026</div>
    <div class="nav">
      <button id="prevBtn" aria-label="Mois précédent">‹</button>
      <button id="nextBtn" aria-label="Mois suivant">›</button>
    </div>
  </header>

  <section class="odometer" aria-live="polite">
    <div class="odo-row">
      <div class="odo-big"><span id="tripCount">0</span><span class="unit">trajets</span></div>
      <div class="odo-euro" id="euroAmount">0,00 €</div>
    </div>
    <div class="odo-sub">
      <div class="odo-split">
        <span>🚲 <span id="veloCount">0</span></span>
        <span>🛴 <span id="trottCount">0</span></span>
      </div>
      <span id="kmTotal">0 km</span>
    </div>
  </section>

  <div class="weekdays">
    <div>Lu</div><div>Ma</div><div>Me</div><div>Je</div><div>Ve</div><div>Sa</div><div>Di</div>
  </div>
  <div class="grid" id="grid"></div>

  <p class="legend">
    Touche un jour : <b>1×</b> = <span class="dot-v">🚲 vélo</span> · <b>2×</b> = <span class="dot-t">🛴 trottinette</span> · <b>3×</b> = effacer.<br>
    <span id="storeMode"></span>
  </p>

  <section class="settings">
    <h2>Indemnité</h2>
    <div class="set-row">
      <div class="field">
        <label for="kmInput">Km aller-retour</label>
        <input id="kmInput" type="number" inputmode="decimal" min="0" step="0.1" value="0">
      </div>
      <div class="field">
        <label for="rateInput">Taux €/km</label>
        <input id="rateInput" type="number" inputmode="decimal" min="0" step="0.01" value="0.37">
      </div>
    </div>
    <div class="field" style="margin-top:10px">
      <label for="nameInput">Ton nom (affiché dans le récap)</label>
      <input id="nameInput" type="text" placeholder="Prénom Nom" autocomplete="name">
    </div>
  </section>

  <button class="copy-btn" id="trimBtn">📤 Envoyer le relevé trimestriel</button>
</div>
<div class="toast" id="toast">Récap copié</div>

<script>
(function(){
  const MONTHS=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const now=new Date();
  let viewYear=now.getFullYear(), viewMonth=now.getMonth();
  let monthData={};           // {"1":"velo","3":"trott",...}
  let settings={km:0,rate:0.37};
  let saveTimer=null;

  const $=id=>document.getElementById(id);

  function monthKey(y,m){return 'trajets:'+y+'-'+String(m+1).padStart(2,'0');}

  const store={mode:'memory',mem:{},warned:false};
  (function detectStore(){
    if(typeof window!=='undefined'&&window.storage){store.mode='claude';return;}
    try{
      const t='__trajets_test__';
      localStorage.setItem(t,'1');localStorage.removeItem(t);
      store.mode='local';
    }catch(e){store.mode='memory';}
  })();

  function warn(msg){
    const toast=$('toast');toast.textContent=msg;toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),2600);
  }

  async function sGet(key){
    if(store.mode==='claude'){
      try{
        const r=await window.storage.get(key,false);
        return r&&r.value?JSON.parse(r.value):null;
      }catch(e){return null;}
    }
    if(store.mode==='local'){
      try{const v=localStorage.getItem(key);return v?JSON.parse(v):null;}
      catch(e){return null;}
    }
    return store.mem[key]||null;
  }

  async function sSet(key,val){
    if(store.mode==='claude'){
      const payload=JSON.stringify(val);
      for(let i=0;i<4;i++){
        try{
          const r=await window.storage.set(key,payload,false);
          if(r)return true;
        }catch(e){/* nouvelle tentative */}
        await new Promise(res=>setTimeout(res,350*(i+1)));
      }
      warn('Sauvegarde en attente — retouche le jour pour réessayer');
      return false;
    }
    if(store.mode==='local'){
      try{localStorage.setItem(key,JSON.stringify(val));return true;}
      catch(e){store.mode='memory';}
    }
    store.mem[key]=val;
    if(!store.warned){
      store.warned=true;
      warn('⚠️ Pas de sauvegarde dans cette vue — héberge le fichier pour la garder');
    }
    return false;
  }

  async function loadSettings(){
    const s=await sGet('trajets:settings');
    if(s){settings=s;}
    $('kmInput').value=settings.km||0;
    $('rateInput').value=settings.rate!=null?settings.rate:0.37;
    $('nameInput').value=settings.name||'';
  }
  async function loadMonth(){
    monthData=(await sGet(monthKey(viewYear,viewMonth)))||{};
    render();
  }
  function saveMonth(){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>sSet(monthKey(viewYear,viewMonth),monthData),250);
  }

  function fmtEuro(n){
    return n.toLocaleString('fr-BE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
  }

  function render(){
    $('monthLabel').innerHTML='<small>Trajets domicile–travail</small>'+
      MONTHS[viewMonth].charAt(0).toUpperCase()+MONTHS[viewMonth].slice(1)+' '+viewYear;

    const grid=$('grid');grid.innerHTML='';
    const first=new Date(viewYear,viewMonth,1);
    const offset=(first.getDay()+6)%7; // semaine commence lundi
    const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
    const isCurrentMonth=(viewYear===now.getFullYear()&&viewMonth===now.getMonth());

    for(let i=0;i<offset;i++){
      const c=document.createElement('div');
      c.className='day empty-cell';c.setAttribute('aria-hidden','true');
      grid.appendChild(c);
    }
    for(let d=1;d<=daysInMonth;d++){
      const btn=document.createElement('button');
      const dow=new Date(viewYear,viewMonth,d).getDay();
      const state=monthData[d]||'';
      btn.className='day'+(dow===0||dow===6?' weekend':'')+
        (isCurrentMonth&&d===now.getDate()?' today':'')+
        (state?' '+state:'');
      btn.innerHTML='<span>'+d+'</span><span class="ico">'+
        (state==='velo'?'🚲':state==='trott'?'🛴':'')+'</span>';
      btn.setAttribute('aria-label','Jour '+d+(state==='velo'?', vélo':state==='trott'?', trottinette':', aucun trajet'));
      btn.addEventListener('click',()=>{
        const cur=monthData[d]||'';
        if(cur==='')monthData[d]='velo';
        else if(cur==='velo')monthData[d]='trott';
        else delete monthData[d];
        saveMonth();render();
      });
      grid.appendChild(btn);
    }
    updateOdometer();
  }

  function updateOdometer(){
    let v=0,t=0;
    for(const k in monthData){
      if(monthData[k]==='velo')v++;
      else if(monthData[k]==='trott')t++;
    }
    const total=v+t;
    const km=total*(parseFloat(settings.km)||0);
    const euro=km*(parseFloat(settings.rate)||0);
    $('tripCount').textContent=total;
    $('veloCount').textContent=v;
    $('trottCount').textContent=t;
    $('kmTotal').textContent=km.toLocaleString('fr-BE',{maximumFractionDigits:1})+' km';
    $('euroAmount').textContent=fmtEuro(euro);
  }

  $('prevBtn').addEventListener('click',()=>{
    viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}loadMonth();
  });
  $('nextBtn').addEventListener('click',()=>{
    viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}loadMonth();
  });

  function onSettingChange(){
    settings.km=parseFloat($('kmInput').value)||0;
    settings.rate=parseFloat($('rateInput').value)||0;
    settings.name=$('nameInput').value.trim();
    sSet('trajets:settings',settings);
    updateOdometer();
  }
  $('kmInput').addEventListener('input',onSettingChange);
  $('rateInput').addEventListener('input',onSettingChange);
  $('nameInput').addEventListener('input',onSettingChange);

  async function buildTrimRecap(){
    const q=Math.floor(viewMonth/3);
    const months=[q*3,q*3+1,q*3+2];
    const km=parseFloat(settings.km)||0;
    const rate=parseFloat(settings.rate)||0;
    const fmtKm=n=>n.toLocaleString('fr-BE',{maximumFractionDigits:1});
    let txt='RELEVÉ TRIMESTRIEL VÉLO — T'+(q+1)+' '+viewYear+'\n';
    if(settings.name)txt+='Nom : '+settings.name+'\n';
    txt+='Base : '+fmtKm(km)+' km A/R par jour × '+rate.toLocaleString('fr-BE',{maximumFractionDigits:2})+' €/km\n';
    let totalDays=0;
    for(const m of months){
      const data=(await sGet(monthKey(viewYear,m)))||{};
      const velo=[],trot=[];
      Object.keys(data).map(Number).sort((a,b)=>a-b).forEach(d=>{
        (data[d]==='velo'?velo:trot).push(d);
      });
      const mm=String(m+1).padStart(2,'0');
      txt+='\n'+MONTHS[m].toUpperCase()+' — '+velo.length+' jour(s) · '+fmtKm(velo.length*km)+' km\n';
      txt+=(velo.length?velo.map(d=>String(d).padStart(2,'0')+'/'+mm).join(' · '):'—')+'\n';
      if(trot.length){
        txt+='(jours trottinette, non éligibles : '+trot.map(d=>String(d).padStart(2,'0')+'/'+mm).join(' · ')+')\n';
      }
      totalDays+=velo.length;
    }
    txt+='\nTOTAL KM T'+(q+1)+' : '+fmtKm(totalDays*km)+' km ('+totalDays+' jours)\n';
    txt+='MONTANT : '+fmtKm(totalDays*km)+' km × '+rate.toLocaleString('fr-BE',{maximumFractionDigits:2})+' € = '+fmtEuro(totalDays*km*rate)+'\n';
    txt+='\n⏰ Formulaire + relevé à remettre à la cellule Traitement et Salaires avant le 10 du mois suivant le trimestre.';
    return txt;
  }
  $('trimBtn').addEventListener('click',async()=>{
    const txt=await buildTrimRecap();
    if(navigator.share){
      navigator.share({text:txt}).catch(()=>{});
    }else if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(()=>warn('Relevé trimestriel copié ✓')).catch(()=>{});
    }
  });

  (async function init(){
    const modeTxt={
      claude:'💾 Sauvegarde automatique (Claude).',
      local:'💾 Sauvegarde automatique dans ce navigateur.',
      memory:'⚠️ Session uniquement — les coches seront perdues à la fermeture.'
    };
    $('storeMode').textContent=modeTxt[store.mode];
    await loadSettings();
    await loadMonth();
  })();
})();
</script>
</body>
</html>
